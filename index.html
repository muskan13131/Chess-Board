<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChessBoard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chess-board">
      <!-- row1 black pieces-->
      <div class="box1">&#9820</div> <!--Rook-->
      <div class="box2">&#9822</div> <!--Knight-->
      <div class="box1">&#9821</div> <!--Bishop-->
      <div class="box2">&#9819</div> <!--Queen-->
      <div class="box1">&#9818</div> <!--King-->
      <div class="box2">&#9821</div> <!--Bishop-->
      <div class="box1">&#9822</div> <!--Knight-->
      <div class="box2">&#9820</div> <!--Rook-->

      <!-- row2 black pawn-->
      
      <div class="box2">	&#9823</div>
      <div class="box1">	&#9823</div>
      <div class="box2">	&#9823</div>
      <div class="box1">	&#9823</div>
      <div class="box2">	&#9823</div>
      <div class="box1">	&#9823</div>
      <div class="box2">	&#9823</div>
      <div class="box1">	&#9823</div>

      <!-- row3 -->
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>

      <!-- row4 -->
      
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>

      <!-- row5 -->
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>

      <!-- row6 -->
      
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box1"></div>

      <!-- row7 white pawn-->
      <div class="box1">	&#9817</div>
      <div class="box2">	&#9817</div>
      <div class="box1">	&#9817</div>
      <div class="box2">	&#9817</div>
      <div class="box1">	&#9817</div>
      <div class="box2">	&#9817</div>
      <div class="box1">	&#9817</div>
      <div class="box2">	&#9817</div>

      <!-- ror8 white pieces-->
      
      <div class="box2">&#9814</div>
      <div class="box1">&#9816</div>
      <div class="box2">&#9815</div>
      <div class="box1">&#9813</div>
      <div class="box2">&#9812</div>
      <div class="box1">&#9815</div>
      <div class="box2">&#9816</div>
      <div class="box1">&#9814</div>
    </div>
  </body>
</html>
